name: watch-sigaa

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: watch-sigaa
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run watcher
        run: python3 watch_sigaa.py

      - name: Commit updated state
        run: |
          git config user.name "watch-sigaa-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_ids.txt
          git diff --staged --quiet || git commit -m "update seen ids [skip ci]"
          git push
